name: Publish Linter

on:
  workflow_dispatch:
  push:
    tags:
      - "linter-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Resolve symlinks
        run: |
          cd linter
          for f in README.md README-ja.md LICENSE; do
            if [ -L "$f" ]; then cp --remove-destination "$(readlink -f "$f")" "$f"; fi
          done

      - name: Publish to npm
        run: cd linter && npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
