name: Bug Report
description: Report a bug or unexpected behavior in Purus
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the sections below as completely as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Write the following Purus code...
        2. Run `purus run ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error messages or logs if available.
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Minimal Reproduction Code
      description: The smallest Purus code snippet that reproduces the issue.
      render: purus

  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      description: Which part of Purus is affected?
      options:
        - core (compiler)
        - linter (@puruslang/linter)
        - prettier-plugin (@puruslang/prettier-plugin-purus)
        - VS Code Extension
        - docs (pages/)
        - CLI
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Purus Version
      description: Run `purus --version` to find this.
      placeholder: "e.g. 0.9.0"
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: Run `node --version` to find this.
      placeholder: "e.g. 22.0.0"

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information that might be relevant.
